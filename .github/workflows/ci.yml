name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUSTFLAGS: "-D warnings"
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain (pinned)
        uses: dtolnay/rust-toolchain@1.82.0
        with:
          components: rustfmt, clippy

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: cargo-${{ runner.os }}-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml

      - name: install python deps
        run: |
          python -m pip install --upgrade pip
          # maturin develop refuses to install into a non-virtualenv
          # interpreter; create one up front and reuse it for every
          # python step below.
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e 'python/[dev]'
          pip install maturin
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: lint (rust + python)
        run: make lint

      - name: test rust
        run: make test-rust

      - name: build native extension
        run: maturin develop --manifest-path crates/py-bindings/Cargo.toml

      - name: test python (unit + smoke)
        run: cd python && pytest -q

      - name: smoke fixture regenerates byte-identical
        run: |
          cd python && python -c "
          from strategy_gpt.smoke import run_smoke
          from pathlib import Path
          import json
          ref = json.loads(Path('../kb/fixtures/smoke_run.json').read_text())
          got = run_smoke().to_json()
          assert ref == got, (
              'smoke fixture drifted; regenerate via '
              'python -m strategy_gpt.smoke --write kb/fixtures/smoke_run.json'
          )
          "
