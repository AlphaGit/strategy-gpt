# VXX volatility-range reference experiment.
# See docs/reference/experiment-spec.md for the schema.

artifact: ../../crates/target/debug/libvxx_strategy.dylib
strategy_label: vxx-local

bars:
  dataset: 29bdecf5fe758d38d524025321aacfb2825daf2fbcce4a3c2c04377bf635b97b

engine:
  fill_model: NextBarOpen
  initial_capital: 100000.0
  commission_per_fill: 0.0
  sanity:
    max_intent_size: 1.0e9
    max_position_size: 1.0e9

seed: 42
slice:
  start: 2018-01-01T00:00:00Z
  end:   2026-12-31T00:00:00Z

runs:
  - params:
      size: 100.0
      symbol: VXX
    modes:
      - { kind: plain }
  - params: { vol_lo: 0.30, vol_hi: 0.75, size: 100.0, symbol: VXX }
  - params: { vol_lo: 0.35, vol_hi: 0.80, size: 100.0, symbol: VXX }
  - params: { vol_lo: 0.40, vol_hi: 0.85, size: 100.0, symbol: VXX }

folds:
  count: 4
  scheme: rolling

optimize:
  method: recursive_grid
  seed: 42
  aggregator: mean
  space:
    vol_lo:
      type: float
      low: 0.0
      high: 10.00
    vol_hi:
      type: float
      low: 0.0
      high: 10.00
  recursive_grid:
    resolution: 10
    top_k: 1
    depth: 5
    plateau_epsilon: 0.0001
  persist:
    root: ./ledger
    name: vxx-recursive-grid

parallelism: auto
